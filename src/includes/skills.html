<section id="skills">

    <h2>skills</h2>

    <div>
        <small>... or tools I enjoy working with the most</small><br>
        <dl id="dl-skills">
            {% for skill in skills %}
            <dd>
                <span>&#183; </span>
                {{ skill.name }}
                <span>{% if skill.favourite%} &#9733; {% endif %}</span>
            </dd>
            {% endfor %}
        </dl>
    </div>

    

</section>
